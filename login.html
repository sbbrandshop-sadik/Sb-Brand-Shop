<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SB Brand Shop</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-container h2 {
      margin-bottom: 25px;
      color: #333;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #666;
      font-size: 14px;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
    }
    .input-group input:focus {
      border-color: #3498db;
      box-shadow: 0 0 5px rgba(52, 152, 219, 0.2);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #34495e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-login:hover {
      background: #2c3e50;
      transform: translateY(-2px);
    }
    .shop-link {
      margin-top: 20px;
      display: block;
      color: #3498db;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h2>🔐 SB Brand Admin Login</h2>
  <form id="loginForm">
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" required>
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn-login">Login to Dashboard</button>
  </form>
  <a href="index.html" class="shop-link">← Back to Shop</a>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    // আপনার ইউজারনেম এবং পাসওয়ার্ড এখানে সেট করুন
    if(user === "admin" && pass === "1234") {
      alert("Login Successful!");
      window.location.href = "admin.html"; // লগইন সফল হলে এডমিন পেজে নিয়ে যাবে
    } else {
      alert("Invalid Username or Password!");
    }
  });
</script>

</body>
</html>
