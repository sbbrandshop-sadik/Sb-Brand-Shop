<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - SB Brand Shop</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f6;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background: black;
      color: white;
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    /* CART CONTAINER */
    .cart-container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    /* CART ITEM */
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }

    .item-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .item-info img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .item-details h3 {
      margin: 0;
      font-size: 18px;
      color: #222;
    }

    .item-details p {
      margin: 5px 0 0;
      color: green;
      font-weight: bold;
    }

    .remove-btn {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .remove-btn:hover {
      background: #e60000;
    }

    /* TOTAL SECTION */
    .total-section {
      margin-top: 30px;
      text-align: right;
    }

    .total-price {
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }

    .checkout-btn {
      display: block;
      width: 100%;
      background: #2ecc71;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
    }

    .checkout-btn:hover {
      background: #27ae60;
    }

    .empty-msg {
      text-align: center;
      padding: 40px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div style="font-size: 20px; font-weight: bold;">SB Brand Shop</div>
    <a href="shop.html" class="back-btn">← Back to Shop</a>
  </div>

  <div class="cart-container">
    <h2>🛒 Your Shopping Cart</h2>
    
    <div id="cartItems"></div>

    <div id="cartSummary" style="display: none;">
      <div class="total-section">
        <span class="total-price">Total: <span id="totalAmount">0</span> BDT</span>
      </div>
      <a href="order.html" class="checkout-btn">🛍️ Place Order</a>
    </div>
  </div>

  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const container = document.getElementById("cartItems");
      const summary = document.getElementById("cartSummary");
      const totalSpan = document.getElementById("totalAmount");
      
      container.innerHTML = "";
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = "<p class='empty-msg'>Your cart is empty. Start shopping!</p>";
        summary.style.display = "none";
        return;
      }

      summary.style.display = "block";
      
      cart.forEach((item, index) => {
        total += Number(item.price);
        
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <div class="item-info">
            <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/70'">
            <div class="item-details">
              <h3>${item.name}</h3>
              <p>${item.price} BDT</p>
            </div>
          </div>
          <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
        `;
        container.appendChild(div);
      });

      totalSpan.innerText = total;
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    // পেজ লোড হলে কার্ট ডাটা দেখাবে
    document.addEventListener("DOMContentLoaded", loadCart);
  </script>
</body>
</html>
