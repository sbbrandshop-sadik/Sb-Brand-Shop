<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SB Brand Shop - Premium Fashion</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f4f4;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background: #000;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-buttons button {
      margin-left: 10px;
      padding: 8px 18px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
      transition: 0.3s;
    }

    .cart-btn { background: #f57224; color: white; }
    .login-btn { background: transparent; color: white; border: 1px solid white !important; }

    /* BANNER AREA - Responsive */
    .banner-section {
      margin: 20px 5%;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      position: relative;
    }

    .banner-box {
      flex: 1;
      min-width: 300px;
      height: 250px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .banner-left img { width: 100%; height: 100%; object-fit: cover; }
    .banner-right {
      background: linear-gradient(135deg, #1a1a1a, #333);
      color: #ffcc00;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    /* PRODUCT GRID */
    .section-title { margin: 30px 5% 15px 5%; font-size: 24px; font-weight: bold; color: #333; }

    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
      padding: 0 5% 40px 5%;
    }

    /* DARAZ STYLE CARD */
    .product-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: 0.3s;
      border: 1px solid #eee;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }

    .img-box { position: relative; width: 100%; height: 180px; background: #f8f8f8; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    
    .discount-tag {
      position: absolute; top: 8px; left: 8px;
      background: #f57224; color: white; padding: 2px 6px;
      border-radius: 3px; font-size: 11px; font-weight: bold;
    }

    .card-info { padding: 10px; flex-grow: 1; }
    .p-title { 
      font-size: 13px; color: #212121; margin: 0 0 8px 0; 
      height: 36px; overflow: hidden; display: -webkit-box; 
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
    }

    .price-box { margin-bottom: 10px; }
    .p-price { font-size: 18px; color: #f57224; font-weight: bold; }
    .p-old-price { font-size: 12px; color: #9e9e9e; text-decoration: line-through; margin-left: 5px; }

    .p-desc { font-size: 11px; color: #757575; margin-bottom: 10px; line-height: 1.3; }

    .add-to-cart {
      width: 100%; background: #212121; color: white; border: none;
      padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;
    }
    .add-to-cart:hover { background: #f57224; }

    /* Mobile view tweaks */
    @media (max-width: 768px) {
      #products { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .banner-box { height: 180px; }
      .section-title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div style="font-size: 22px; font-weight: bold; letter-spacing: 1px;">SB BRAND</div>
    <div class="nav-buttons">
      <a href="login.html"><button class="login-btn">Admin</button></a>
      <a href="cart.html"><button class="cart-btn">🛒 Cart</button></a>
    </div>
  </div>

  <div class="banner-section">
    <div class="banner-box banner-left">
      <img id="bannerImg" src="https://via.placeholder.com/800x400?text=Premium+Collection" alt="Banner">
    </div>
    <div class="banner-box banner-right">
      <h1 style="margin:0;">MEGA SALE!</h1>
      <p>Up to 50% Off on Latest Bags</p>
      <button style="background:#ffcc00; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">Shop Now</button>
    </div>
  </div>

  <div class="section-title">✨ Just For You</div>
  
  <div id="products">Loading premium products...</div>

  <script>
    const API_BASE = "https://sb-brand-shop.onrender.com/api";

    function loadProducts() {
      fetch(`${API_BASE}/products`)
        .then(res => res.json())
        .then(products => {
          const container = document.getElementById("products");
          container.innerHTML = "";
          
          if(!products || products.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No products available.</p>";
            return;
          }

          products.forEach(p => {
            // ডিসকাউন্ট ক্যালকুলেশন
            const hasDiscount = p.oldPrice && p.oldPrice > p.price;
            const discountPercent = hasDiscount ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
            
            // ৩টি ছবির মধ্যে প্রথম ছবিটি দেখাবে (Main Image)
            const mainImg = (p.images && p.images.length > 0) ? p.images[0] : (p.externalUrl || 'https://via.placeholder.com/200');

            const div = document.createElement("div");
            div.className = "product-card";
            div.innerHTML = `
              <div class="img-box">
                <img src="${mainImg}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200'">
                ${hasDiscount ? `<div class="discount-tag">-${discountPercent}%</div>` : ''}
              </div>
              <div class="card-info">
                <h3 class="p-title">${p.name}</h3>
                <div class="price-box">
                  <span class="p-price">৳${p.price}</span>
                  ${hasDiscount ? `<span class="p-old-price">৳${p.oldPrice}</span>` : ''}
                </div>
                <p class="p-desc">${p.description ? p.description.substring(0, 50) + '...' : 'Premium quality product'}</p>
                <button class="add-to-cart" onclick="addToCart('${p.name}', ${p.price}, '${mainImg}')">Add to Cart</button>
              </div>
            `;
            container.appendChild(div);
          });
        })
        .catch(err => {
          document.getElementById("products").innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Server waking up... please refresh in 30 seconds.</p>";
        });
    }

    function addToCart(name, price, image) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push({ name, price, image });
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("✅ " + name + " কার্টে যোগ করা হয়েছে!");
    }

    document.addEventListener("DOMContentLoaded", () => {
      // ব্যানার লোড
      const savedBanner = localStorage.getItem("adminBanner");
      if (savedBanner) document.getElementById("bannerImg").src = savedBanner;
      
      loadProducts();
    });
  </script>
</body>
</html>
