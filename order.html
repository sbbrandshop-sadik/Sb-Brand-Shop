<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - SB Brand Shop</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; color: #333; }
    .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #111; margin-bottom: 20px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #555; }
    .form-group input { 
      width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: 0.3s;
    }
    .form-group input:focus { border-color: #007bff; outline: none; }

    .row { display: flex; gap: 10px; }
    .row .form-group { flex: 1; }

    .summary-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #28a745; }
    .summary-box p { margin: 5px 0; font-size: 16px; display: flex; justify-content: space-between; font-weight: bold; }

    .btn-confirm { 
      width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; 
    }
    .btn-confirm:hover { background: #218838; }
    .btn-confirm:disabled { background: #94d3a2; cursor: not-allowed; }
    
    .back-link { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 14px; }
    .optional-text { font-weight: normal; color: #888; font-size: 12px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>📝 Checkout Information</h2>

    <div class="summary-box">
      <p>Total Payable: <span><span id="displayTotal">0</span> BDT</span></p>
    </div>

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="custName" placeholder="Apnar name likhun">
    </div>

    <div class="form-group">
      <label>Phone Number *</label>
      <input type="text" id="custPhone" placeholder="Apnar mobile number">
    </div>

    <div class="row">
      <div class="form-group">
        <label>District *</label>
        <input type="text" id="custDistrict" placeholder="Jela">
      </div>
      <div class="form-group">
        <label>Upazila/Thana *</label>
        <input type="text" id="custThana" placeholder="Thana">
      </div>
    </div>

    <div class="form-group">
      <label>Village / Road / House No *</label>
      <input type="text" id="custVillage" placeholder="Gram/Rasta/Basa number">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="row">
      <div class="form-group">
        <label>Color <span class="optional-text">(Optional)</span></label>
        <input type="text" id="prodColor" placeholder="e.g. Black, White">
      </div>
      <div class="form-group">
        <label>Size <span class="optional-text">(Optional)</span></label>
        <input type="text" id="prodSize" placeholder="e.g. M, L, XL, 42">
      </div>
    </div>

    <button class="btn-confirm" id="confirmBtn" onclick="submitOrder()">Confirm Order</button>
    
    <a href="cart.html" class="back-link">← Back to Cart</a>
  </div>

  <script>
    const API_BASE = "https://sb-brand-shop.onrender.com/api";

    function initOrder() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (cart.length === 0) {
        alert("Cart empty! Age shop theke product add korun.");
        window.location.href = "shop.html";
        return;
      }
      let total = 0;
      cart.forEach(item => total += Number(item.price));
      document.getElementById("displayTotal").innerText = total;
    }

    async function submitOrder() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const name = document.getElementById("custName").value;
      const phone = document.getElementById("custPhone").value;
      const district = document.getElementById("custDistrict").value;
      const thana = document.getElementById("custThana").value;
      const village = document.getElementById("custVillage").value;
      
      // Optional fields logic
      const color = document.getElementById("prodColor").value || "Not Selected";
      const size = document.getElementById("prodSize").value || "Not Selected";
      
      const total = document.getElementById("displayTotal").innerText;

      // Validation for mandatory fields
      if (!name || !phone || !district || !thana || !village) {
        alert("Star (*) mark deya gulo obossoi puron korun!");
        return;
      }

      const confirmBtn = document.getElementById("confirmBtn");
      confirmBtn.innerText = "Processing...";
      confirmBtn.disabled = true;

      // Full address string toiri kora
      const fullAddress = `District: ${district}, Thana: ${thana}, Village/Road: ${village}`;

      const orderData = {
        customerName: name,
        phoneNumber: phone,
        address: fullAddress,
        pantInfo: color, // DB te pantInfo te color jabe
        shirtInfo: size,  // DB te shirtInfo te size jabe
        items: cart,
        totalAmount: total
      };

      try {
        const res = await fetch(`${API_BASE}/orders`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(orderData)
        });

        if (res.ok) {
          alert("Abhinandan! Apnar order ti confirm hoyeche.");
          localStorage.removeItem("cart"); // Order hoye gele cart clear hobe
          window.location.href = "shop.html"; // Shop page e niye jabe
        } else {
          alert("Order nite somossa hoyeche. Server check korun.");
        }
      } catch (err) {
        console.error(err);
        alert("Server problem! Wait kore abar chesta korun.");
      } finally {
        confirmBtn.innerText = "Confirm Order";
        confirmBtn.disabled = false;
      }
    }

    document.addEventListener("DOMContentLoaded", initOrder);
  </script>
</body>
</html>
